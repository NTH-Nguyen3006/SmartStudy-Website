{% extends 'index.html' %}
{% load static %}

{% block reset-password %}

<link rel="stylesheet" href="{% static 'css/account.css' %}">
<script src="{% static 'Scripts.js' %}"></script>

<div class="reset_password-box" style="width: 100%;">
    <article class="reset_password-container">
        {% if not email %}
        <section class="email-form" id="email-form">
            <div class="form-floating mb-3" id="email-box">
                <input type="email" class="form-control" name="email" id="floatingInput" placeholder="name@example.com"
                    autofocus>
                <label for="floatingInput">Nhập Email</label>
            </div>
            <div class="form-floating mb-3" id="resend-email" style="display: none;">
                <a class="resend" href="">Gửi lại</a>
            </div>
            <div class="form-floating mb-3">
                <button class="btn btn-primary" id="submit-button" type="submit">Xác nhận</button>
            </div>
        </section>
        {% endif %}

        {% if email %}
        <section class="otpcode-box" id="otpcode-box">
            {% include "Form/OTP-Code.html" %}
            <div class="form-floating mb-3">
                <div class="form-floating mb-3" id="resend-otpcode" style="display: none;">
                    <a class="resend" href="">Gửi lại</a>
                </div>
                <button class="btn btn-primary" id="submit-button" type="submit"
                    onclick="add_resend_button()">Gửi</button>
            </div>
        </section>
        {% endif %}

        {% if email and otpcode %}
        <section class="password-box" id="password-box">
            {% include "Form/set-password.html" %}
            <div class="form-floating mb-3">
                <button class="btn btn-primary" id="submit-button" type="submit">Xác nhận</button>
            </div>
        </section>
        {% endif %}
    </article>
</div>

<script>
    // const submit = document.getElementById('submit-button');
    let email_box = document.getElementById("email-container");
    let password_box = document.getElementById("password-container");
    let otpcode_box = document.getElementById("otpcode-container");

    function create_valid_feedback(className = "invalid", content) {
        let create_div = document.createElement('div');
        create_div.className = `${className}-feedback`;
        create_div.id = "validationServerFeedback";
        create_div.textContent = content;

        return create_div;
    }

    document.getElementById('submit-button').addEventListener("click", () => {
        var json_request;

        if ("{{email}}" && "{{otpcode}}") {
            const password_box = document.getElementById("verify_password-box");
            const passw = document.getElementsByName('password');
            const verify_passw = document.getElementsByName('verify_password');
            var password = passw[0].value;
            var verify_password = verify_passw[0].value;

            if (password && verify_password) {
                if (password === verify_password) {
                    json_request = {
                        'email': '{{email}}',
                        'password': password,
                    };

                } else if (password.length < 8 || verify_password.length < 8) {
                    document.getElementsByName("verify_password")[0]
                        .className = "form-control is-invalid";

                    let create_div = create_valid_feedback("Mật khẩu ít nhất có 8 kí tự.")

                    if (!password_box.querySelector('.invalid-feedback'))
                        password_box.insertBefore(create_div, password_box.children[-1]);

                } else {
                    document.getElementsByName("verify_password")[0]
                        .className = "form-control is-invalid";

                    let create_div = create_valid_feedback("Mật khẩu xác nhận nhập không khớp");

                    if (!password_box.querySelector('.invalid-feedback'))
                        password_box.insertBefore(create_div, password_box.children[-1]);
                }
            }
        }
        else if ("{{email}}") {
            const box = document.getElementById("otpcode-box");
            const code = document.getElementsByName('otp-code');
            const resend = document.getElementById("resend-otpcode");
            var code_value = code[0].value;

            resend.style = "";
            if (!code_value) { // is empty
                let create_div = create_valid_feedback("Vui lòng nhập mã OTP để gửi.");

                if (!box.querySelector('.invalid-feedback'))
                    box.insertBefore(create_div, box.children[-1]);
            } else {
                json_request = {
                    "email": "{{email}}",
                    "otp-code": code,
                }
            }
        }
        else {
            const email = document.getElementsByName("email");
            const email_box = document.getElementById("email-box");
            var email_value = email[0].value;

            if (email_value) {
                json_request = {
                    'email': email_value,
                };
            } else {
                let create_div = create_valid_feedback("Vui lòng nhập thông tin");

                document.getElementsByName("email")[0]
                    .className = 'form-control is-invalid';

                if (!email_box.querySelector('.invalid-feedback'))
                    email_box.insertBefore(create_div, email_box.children[-1])
            }
        }

        if (json_request) {
            fetch('{% url "reset-password" %}', {
                method: "POST",
                body: JSON.stringify(json_request),
            }).then(response => response.json())
                .then(data => {
                    var message = data.message;
                    alert(message);
                });
        }
    });

</script>

{% endblock reset-password %}
