{% extends "index.html" %}
{% load static %}

{% block signUp %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
<script src="{% static 'Scripts.js' %}"></script>

<div class="register-box">
    <article class="register-container" id="register-container">
        <section class="register-form">
            {% csrf_token %}
            <div class="form-floating mb-3" id="username-box">
                <input name="username" class="form-control" id="floatingInput" placeholder="username">
                <label for="floatingInput">Tên đăng nhập</label>
            </div>

            <div class="form-floating mb-3" id="full_name-box">
                <div class="form-floating">
                    <input name="last_name" class="form-control" id="floatingInput" placeholder="last_name">
                    <label for="floatingInput">Họ</label>
                </div>
                <div class="form-floating">
                    <input name="first_name" class="form-control" id="floatingInput" placeholder="first_name">
                    <label for="floatingInput">Tên</label>
                </div>
            </div>

            <div class="form-floating mb-3" id="email-box">
                <input type="email" name="email" class="form-control" id="floatingInput" placeholder="name@example.com"
                    aria-describedby="validationServerFeedback" required>
                <label for="floatingInput">Email</label>
            </div>

            {% include "Form/set-password.html" %}

            <div class="form-floating mb-5">
                <button class="btn btn-primary" id="submit-button" type="submit">Xác nhận</button>
            </div>
        </section>

        <section class="form-floating">
            <a href="{% url 'social:begin' 'google-oauth2' %}?next=/register/" class="btn btn-light google-sign-in"
                id="google-button">
                <div class="google-logo">
                    <img class="btn-logo" width="25px" height="25px" src="{% static 'Image\logo\google-logo.png' %}">
                </div>
                <span style="font-weight: 500;">Đăng ký bằng Google</span>
            </a>
        </section>
    </article>
</div>

    function register(user_is_anonymous) {

    function otpCode_clickEnvent(user) {
        const code_input = document.getElementsByName("otp-code");
        const box = document.getElementById("verify_password-box");
        var code = code_input[0].value;

        if (code) {
            document.getElementById('resend-otpcode').style = ''

            fetch("{% url 'otp-code' %}", {
                method: "POST",
                body: JSON.stringify({
                    "code": code,
                    "user": user,
                }),
            }).then(response => {
                let data = response.json();
                if (response.status == 400) {
                    data.then(json => {

                        let create_div = create_valid_feedback(data.message);
                        if (!box.querySelector('.invalid-feedback'))
                            box.insertBefore(create_div, box.children[-1]);
                    });
                }
            });

        } else {
            document.getElementsByName("otp-code")[0]
                .className = "form-control is-invalid";
        }
    }

    function create_valid_feedback(className = "invalid", content) {
        let create_div = document.createElement('div');
        create_div.className = `${className}-feedback`;
        create_div.id = "validationServerFeedback";
        create_div.textContent = content;

        return create_div;
    }

    async function addCountDownElement(second, elementToInner) {
        var countDownDate = Date.now() + (second * 1000 + 1000);

        // cập nhập thời gian sau mỗi 1 giây
        var x = setInterval(function () {
            // Lấy thời gian hiện tại
            var now = new Date().getTime();

            // Lấy số thời gian chênh lệch
            var distance = countDownDate - now;

            // Tính toán số ngày, giờ, phút, giây từ thời gian chênh lệch
            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // hours = hours < 10 ? "0" + hours : hours;
            minutes = (minutes < 10) ? "0" + minutes : minutes;
            seconds = (seconds < 10) ? "0" + seconds : seconds;

            // HIển thị chuỗi thời gian trong thẻ p
            elementToInner.innerHTML = minutes + ": " + seconds;

            // Nếu thời gian kết thúc, hiển thị chuỗi thông báo
            if (distance < 0) {
                clearInterval(x);
                elementToInner.innerHTML = "Mã đã hết hạn !";
            }
        }, 1000);
    }
</script>

{% endblock signUp %}
